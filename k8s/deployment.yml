apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food
  template:
    metadata:
      labels:
        app: food
    spec:
      containers:
      - name: food
        image: varshapawar026/food-app:latest
        ports:
        - containerPort: 80
